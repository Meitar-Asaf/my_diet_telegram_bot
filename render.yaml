services:
  - type: web
    name: my-diet-telegram-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 main:app
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: BOT_MODE
        value: webhook
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DB_HOST
        value: aws-1-ap-northeast-2.pooler.supabase.com
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres.nhshdjsejokvgzumlrsf
      - key: DB_SSLMODE
        value: require
      - key: DB_PASSWORD
        sync: false
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: APP_TIMEZONE
        value: UTC